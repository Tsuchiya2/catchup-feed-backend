# ============================================================
# catchup-feed - Docker Compose Configuration
# ============================================================
# セキュリティ・パフォーマンス・運用性を最適化した構成
# - Docker Secrets による機密情報管理
# - リソース制限でホスト保護
# - ログローテーション設定
# - ネットワーク分離
# - ヘルスチェック実装
# ============================================================

# ────────────────────────────────────────────────────────────
# ネットワーク定義（分離）
# ────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ────────────────────────────────────────────────────────────
# ボリューム定義
# ────────────────────────────────────────────────────────────
volumes:
  db-data:
    driver: local
  db-backup:
    driver: local
  # 開発用キャッシュ
  go-mod-cache:
    driver: local
  go-build-cache:
    driver: local

# ────────────────────────────────────────────────────────────
# Secrets 定義（機密情報の安全な管理）
# ────────────────────────────────────────────────────────────
# 注意: 現在は .env ファイルで環境変数として管理しています
# Docker Secrets は将来の本番環境デプロイ時に有効化できます
# secrets:
#   jwt_secret:
#     file: ./secrets/jwt_secret.txt
#   anthropic_api_key:
#     file: ./secrets/anthropic_api_key.txt
#   openai_api_key:
#     file: ./secrets/openai_api_key.txt
#   postgres_password:
#     file: ./secrets/postgres_password.txt
#   admin_password:
#     file: ./secrets/admin_password.txt

# ────────────────────────────────────────────────────────────
# サービス定義
# ────────────────────────────────────────────────────────────
services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL データベース (pgvector対応)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg18
    container_name: catchup-postgres
    restart: unless-stopped

    networks:
      - backend

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catchup}
      POSTGRES_DB: ${POSTGRES_DB:-catchup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      # パフォーマンスチューニング
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"

    # ヘルスチェック
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    volumes:
      # PostgreSQL 18+ requires mount at /var/lib/postgresql (not /data)
      # Data is stored in /var/lib/postgresql/18/docker subdirectory
      - db-data:/var/lib/postgresql
      - db-backup:/backup

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    # リソース制限
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    # ログ設定
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres"

  # ──────────────────────────────────────────────────────────
  # 開発環境（Lint、テスト用）
  # ──────────────────────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev

    container_name: catchup-dev

    networks:
      - backend

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      # データベース接続
      DATABASE_URL: postgresql://${POSTGRES_USER:-catchup}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-catchup}?sslmode=disable

      # 認証設定
      JWT_SECRET: ${JWT_SECRET}

      # アプリケーション設定
      TZ: ${TZ:-Asia/Tokyo}

    volumes:
      # ソースコードをマウント（ホットリロード対応）
      - .:/app
      # Go モジュールキャッシュ
      - go-mod-cache:/go/pkg/mod
      # Go ビルドキャッシュ
      - go-build-cache:/root/.cache/go-build

    # デフォルトでは起動しない（明示的に起動が必要）
    profiles:
      - dev

    # シェルを起動したまま維持
    stdin_open: true
    tty: true

    # リソース制限
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # ログ設定
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=dev"

  # ──────────────────────────────────────────────────────────
  # API サーバー
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE}

    container_name: catchup-api
    restart: unless-stopped

    networks:
      - backend

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      # データベース接続
      DATABASE_URL: postgresql://${POSTGRES_USER:-catchup}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-catchup}?sslmode=disable

      # 認証設定
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USER: ${ADMIN_USER:-admin}
      # bcrypt ハッシュ(make admin-hash で生成)。.env 内では '$' を '$$' にエスケープすること
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}

      # アプリケーション設定
      TZ: ${TZ:-Asia/Tokyo}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # CORS設定
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    ports:
      - "${API_PORT:-8080}:8080"

    # ヘルスチェック（Dockerfileで定義済み）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    # リソース制限
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    # ログ設定
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,environment"
        tag: "{{.Name}}/{{.ID}}"

    # セキュリティ設定
    security_opt:
      - no-new-privileges:true
    read_only: false  # SQLiteファイル書き込みのためfalse
    tmpfs:
      - /tmp:size=100M,mode=1777

  # ──────────────────────────────────────────────────────────
  # Worker（クローラー）
  # ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE}

    container_name: catchup-worker
    restart: unless-stopped

    entrypoint: ["/usr/local/bin/api-worker"]
    command: []

    networks:
      - backend

    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy

    environment:
      # データベース接続
      DATABASE_URL: postgresql://${POSTGRES_USER:-catchup}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-catchup}?sslmode=disable

      # AI 要約設定（フォールバック連鎖: Gemini → Groq → Ollama）
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-}
      # 注意: 未設定時のデフォルト http://localhost:11434 は worker コンテナ
      # 自身を指す。実運用では tailnet 上の Mac のアドレスを .env で指定すること
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      SUMMARIZER_CHAR_LIMIT: ${SUMMARIZER_CHAR_LIMIT:-}
      SUMMARIZER_TIMEOUT: ${SUMMARIZER_TIMEOUT:-}

      # Discord通知設定
      DISCORD_ENABLED: ${DISCORD_ENABLED:-false}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}

      # Slack通知設定
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}

      # アプリケーション設定
      TZ: ${TZ:-Asia/Tokyo}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Worker Configuration
      CRON_SCHEDULE: ${CRON_SCHEDULE:-30 5 * * *}
      WORKER_TIMEZONE: ${WORKER_TIMEZONE:-Asia/Tokyo}
      NOTIFY_MAX_CONCURRENT: ${NOTIFY_MAX_CONCURRENT:-10}
      CRAWL_TIMEOUT: ${CRAWL_TIMEOUT:-30m}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-9091}

    ports:
      - "${WORKER_HEALTH_PORT:-9091}:9091"

    # ヘルスチェック
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

    # リソース制限（Workerは並列処理が多い）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # ログ設定
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=worker"

    # セキュリティ設定
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:size=200M,mode=1777
